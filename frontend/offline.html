<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | JanaSeva</title>
  <style>
    :root {
      --ink: #16324f;
      --muted: #5f6b7a;
      --line: #d7dee6;
      --paper: #ffffff;
      --bg: linear-gradient(180deg, #edf4fb 0%, #dfeaf6 100%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .card {
      width: min(560px, 100%);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--paper);
      box-shadow: 0 18px 40px rgba(22, 50, 79, 0.12);
      text-align: center;
    }

    img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 10px;
      line-height: 1.6;
      color: var(--muted);
    }

    a {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border-radius: 999px;
      background: #0e3a5f;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="./image/emblem.png" alt="JanaSeva">
    <h1>Offline | ಆಫ್‌ಲೈನ್</h1>
    <p>You are currently offline. Previously opened JanaSeva pages may still work from cache.</p>
    <p>ನೀವು ಇದೀಗ ಆಫ್‌ಲೈನ್‌ನಲ್ಲಿ ಇದ್ದೀರಿ. ಹಿಂದೆ ತೆರೆಯಲಾದ ಪುಟಗಳು ಇನ್ನೂ ಲಭ್ಯವಾಗಿರಬಹುದು.</p>
    <a href="./user/login.html">Back to Login</a>
  </main>
</body>
</html>
